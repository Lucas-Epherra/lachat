<!doctype html>
<html lang="es-AR">
  <head>
    <!-- Codificación de caracteres -->
    <meta charset="UTF-8" />

    <!-- Responsive: necesario para que el sitio se adapte bien a mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon del navegador -->
    <!-- En Vite, los archivos dentro de /public se referencian desde la raíz -->
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />

    <!-- Icono para dispositivos Apple -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- URL principal del sitio para evitar contenido duplicado en buscadores -->
    <link rel="canonical" href="https://www.estudiolachat.com.ar/" />

    <!-- Título SEO: aparece en Google y en la pestaña del navegador -->
    <title>
      Estudio Jurídico Lachat | Contratos, Locaciones y Asesoramiento Legal
    </title>

    <!-- Descripción SEO: aparece debajo del título en resultados de búsqueda -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.estudiolachat.com.ar/" />
    <meta property="og:site_name" content="Estudio Jurídico Lachat" />
    <meta property="og:locale" content="es_AR" />

    <meta property="og:title" content="Estudio Jurídico Lachat" />
    <meta
      property="og:description"
      content="Asesoramiento legal, contratos de locación, arrendamientos rurales e intimaciones por carta documento."
    />
    <meta
      name="description"
      content="Asesoramiento legal en contratos de locación, arrendamientos rurales, intimaciones por carta documento y consultas legales personalizadas."
    />
    <meta
      property="og:image"
      content="https://www.estudiolachat.com.ar/og-lachat.png?v=2"
    />
    <meta
      property="og:image:secure_url"
      content="https://www.estudiolachat.com.ar/og-lachat.png?v=2"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Estudio Jurídico Lachat - Asesoramiento legal"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Estudio Jurídico Lachat" />
    <meta
      name="twitter:description"
      content="Asesoramiento legal, contratos de locación, arrendamientos rurales e intimaciones por carta documento."
    />
    <meta
      name="twitter:image"
      content="https://www.estudiolachat.com.ar/og-lachat.png?v=2"
    />
  </head>

  <body>
    <!-- Punto de montaje de React -->
    <div id="root"></div>

    <!-- Entrada principal de la aplicación Vite/React -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
